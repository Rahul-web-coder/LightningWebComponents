<template>
    <lightning-card title="Object Info Dem">
        <div class="slds-var-p-around_medium">
            <template if:true={objectInfoProperty.data}>
                <div>DefaultRecordTypeId : {defaultRecordTypeId}</div>
                <div>ApiName : {objectInfoProperty.data.apiName}</div>
            </template>
           
        </div>
    </lightning-card>

    <lightning-card title="Object Infos Demo">
        <div class="slds-var-p-around_medium">
    
            <template if:true={objectInfos}>
                <template for:each={objectInfos.results} for:item="obj">
                    <div key={obj.result.apiName}>
                        <div>ApiName : {obj.result.apiName}</div>
                        <div>DefaultRecordTypeId - {obj.result.defaultRecordTypeId}</div>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
