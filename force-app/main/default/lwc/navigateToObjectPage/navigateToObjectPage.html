        <lightning-button variant="brand" label="Navigate To Record" onclick={navigateToRecord}></lightning-button>

    <lightning-card title="Navigate To Record with Default values">
        <lightning-button variant="brand" label="Navigate To Record with Default" onclick={navigateToRecordwithDefault}></lightning-button>

    <lightning-card title="Navigate To Record List View">
        <lightning-button variant="brand" label="Navigate To Record List View"

            onclick={navigateToRecordFilesView}></lightning-button>
