<template>
    <lightning-card title="Custom Lead Conversion Button">
        <div class="slds-m-around_medium">
            <lightning-button label="Convert" onclick={handleConvertLead}></lightning-button>
        </div>

         <template if:true={message}>
                    <section role="dialog" class="slds-modal slds-fade-in-open">
                        <div class="slds-modal__container">


                            <!-- Modal Body -->
                            <div class="slds-modal__content slds-p-around_medium">
                                <b>Lead Is Converted Successfully</b>
                            </div>

                            <!-- Modal Footer -->
                            <footer class="slds-modal__footer">
                                <lightning-button label="Close" onclick={closeModal}></lightning-button>
                            </footer>
                        </div>
                    </section>
                    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>
    </lightning-card>
</template>
