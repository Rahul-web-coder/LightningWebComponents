<template>
       <!-- Data Binding Example-->
    <lightning-card  title="Two way data binding">
      <div class="slds-m-around_medium">
            <lightning-input type="text" 
                label="Enter course Name" 
                onkeyup={handleChange}>
            </lightning-input>
            <div>{course} is a course</div>
      </div>
    </lightning-card>
    <!-- Tack Example-->
    <lightning-card  title="@track annotation">
      <div class="slds-m-around_medium">
            <lightning-input type="text" 
                label="Enter City Name" 
                onkeyup={handleChangeAddress}>
            </lightning-input>
            <div>{address.city} is my city</div>
      </div>
    </lightning-card>
    <!-- Getter Example-->
     <lightning-card  title="Getter Example">
      <div class="slds-m-around_medium">
            <div>{firstUser}</div>
            <div>{multiply}</div>
      </div>
    </lightning-card>
</template>
