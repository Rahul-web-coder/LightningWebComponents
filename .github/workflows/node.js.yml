# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Detect Node project files
      id: node_files
      run: |
        if [ -f package.json ]; then
          echo "has_package_json=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_package_json=false" >> "$GITHUB_OUTPUT"
        fi

        if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
          echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Use Node.js ${{ matrix.node-version }}
      if: steps.node_files.outputs.has_package_json == 'true' && steps.node_files.outputs.has_lockfile == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      if: steps.node_files.outputs.has_package_json == 'true' && steps.node_files.outputs.has_lockfile == 'true'
      run: npm ci
    - name: Build
      if: steps.node_files.outputs.has_package_json == 'true' && steps.node_files.outputs.has_lockfile == 'true'
      run: npm run build --if-present
    - name: Test
      if: steps.node_files.outputs.has_package_json == 'true' && steps.node_files.outputs.has_lockfile == 'true'
      run: npm test
    - name: Skip Node.js CI
      if: steps.node_files.outputs.has_package_json != 'true' || steps.node_files.outputs.has_lockfile != 'true'
      run: echo "Skipping Node.js CI because package.json and a supported lockfile are not both present."
